<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <title>Task-Card</title>
  </head>
  <body>
    <article>
      <p>welcome-Taskcard</p>
      <h3 class="received-title" data-testid="test-todo-title"></h3>
      <div class="received-Description" data-testid="test-todo-description"></div>
      <p class="received-Date" data-testid="test-todo-due-date"></p>
      <p class="received-Time"></p>
      <p class="status"></p>
      <input
        type="checkbox"
        id="checkbox"
        value="true"
        data-testid="test-todo-complete-toggle"
      />
      <button class="Delete" data-testid="test-todo-delete-button">
        Delete
      </button>
      <button class="edit" data-testid="test-todo-edit-button">Edit</button>
    </article>
    <script>
      // gets the h3 and p in the Main.HTML
      const receivedTilted = document.querySelector(".received-title");
      const receivedDescription = document.querySelector(
        ".received-Description",
      );
      const receivedDate = document.querySelector(".received-Date");
      const receivedTime = document.querySelector(".received-Time");

      const checkbox = document.querySelector("#checkbox");
      const status = document.querySelector(".status");
      const Delete = document.querySelector(".Delete");
      const edit = document.querySelector(".edit");

      // gets the shared-data from the sent-files using the getItem from Localstorage
      const receivedData = localStorage.getItem("sharedData");

      // this updates the Ui With the title and description
      if (receivedData) {
        const task = JSON.parse(receivedData);
        if (task.sentTitle && task.sentDescription) {
          receivedTilted.textContent = task.sentTitle;
          receivedDescription.textContent = task.sentDescription;
        } else if (!task.sentDescription) {
          receivedTilted.textContent = task.sentTitle;
          receivedDescription.textContent = "NO DESCRIPTION";
        } else {
          receivedDescription.textContent = task.sentDescription;
          receivedTilted.textContent = "NO TITLE";
        }

        // this updates the Ui With the time and date
        if (task.isoDate && task.isoTime) {
          receivedDate.textContent = task.isoDate;
          receivedTime.textContent = task.isoTime;
        }
        if (task.status) {
          status.textContent = "⚠️ Overdue";
          status.style.color = "red";
        } else if (!task.status) {
          status.textContent = "✅ On Track";
          status.style.color = "green";
        }
      }

      // this functions for the checkbox input and updates the Ui styles
      checkbox.addEventListener("click", () => {
        if (checkbox.checked) {
          receivedTilted.style.color = "blue";
          receivedTilted.style.textDecoration = "line-through";
          alert("Tasked-Cleared");
        } else {
          receivedTilted.style.textDecoration = "none";
          receivedTilted.style.color = "black";
        }
      });

      // this for the delete button; it clears the UI
      Delete.addEventListener("click", (e) => {
        e.preventDefault();
        receivedDate.textContent = "";
        receivedTime.textContent = "";
        receivedDescription.textContent = "";
        receivedTilted.textContent = "";
      });

      edit.addEventListener("click", () => {
        alert("EditButton - clicked");
      });
    </script>
  </body>
</html>
