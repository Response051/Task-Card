<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Task-Card</title>
  </head>
  <body>
    <article
      class="root-card"
      class="welcome-card"
      data-testid="test-todo-card"
    >
      <h2>Title</h2>
      <input
        type="text"
        id="sentTitle"
        name="Title"
        placeholder="Title..."
        data-testid="test-todo-title"
      />
      <p>Description</p>
      <input
        type="text"
        id="textDescription"
        name="Description"
        data-testid="test-todo-description"
      />
      <p>date</p>
      <input type="date" id="date" data-testid="test-todo-due-date" />
      <p class="time">Time</p>
      <time><input type="time" id="time" /></time>
      <button
        onclick="moveAll()"
        class="button"
        href="./main.html"
        data-testid="test-todo-delete-button"
      >
        Create Task
      </button>
      <!-- <a href="./main.html" onclick="moveAll()">create</a> -->
    </article>
    <script>
      function moveAll() {
        sentTitle = document.querySelector("#sentTitle").value;
        sentDescription = document.querySelector("#textDescription").value;
        date = document.getElementById("date").value;
        time = document.getElementById("time").value;

        // use the date() obj to create a date Obj from a string value same for time
        dateValue = new Date(`${date}T${time}`);
        now = new Date();
        timeValue = new Date(`1994-12-03T${time}`);

        let status = "active";
        if (dateValue > now) {
          status = "overdue";
        }

        // date and time objs converted to ISO standards
        isoDate = dateValue.toDateString();
        isoTime = timeValue.toLocaleTimeString();
        const allData = {
          sentTitle: sentTitle,
          sentDescription: sentDescription,
          isoDate: isoDate,
          isoTime: isoTime,
          status: status,
        };

        // Save it to localStorage (Key: "sharedData", Value: value), where JSON is used to store allData
        localStorage.setItem("sharedData", JSON.stringify(allData));
        window.location.href = "./main.html";
      }
    </script>
  </body>
</html>
