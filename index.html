<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Task-Card</title>
  </head>
  <body>
    <article class="root-card" class="welcome-card">
      <h2>Title</h2>
      <input type="text" id="sentTitle" name="Title" placeholder="Title..." />
      <p>Description</p>
      <input type="text" id="textDescription" name="Description" />
      <p>date</p>
      <input type="date" id="date" />
      <p class="time">Time</p>
      <time><input type="time" id="time" /></time>

      <input type="checkbox" id="checkbox" />
      <button class="button">submit</button>
      <a href="./main.html" onclick="moveAll()">create</a>
    </article>
    <script>
      function moveAll() {
        const allData = {
          sentTitle: document.querySelector("#sentTitle").value,
          sentDescription: document.querySelector("#textDescription").value,
        };
        // Save it to localStorage (Key: "sharedData", Value: value)
        localStorage.setItem("sharedData", JSON.stringify(allData));
        // localStorage.setItem("sharedData2", sentDescription);
        window.location.href = "./main.html";
      }
    </script>
  </body>
</html>
