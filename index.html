<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Task-Card</title>
  </head>
  <body>
    <article class="root-card" class="welcome-card">
      <h2>Title</h2>
      <input type="text" id="sentTitle" name="Title" placeholder="Title..." />
      <p>Description</p>
      <input type="text" id="textDescription" name="Description" />
      <p>date</p>
      <input type="date" id="date" />
      <p class="time">Time</p>
      <time><input type="time" id="time" /></time>

      <input type="checkbox" id="checkbox" />
      <button class="button" href="./main.html">submit</button>
      <a href="./main.html" onclick="moveAll()" class="anchor">create</a>
    </article>
    <script>
      function moveAll() {
        sentTitle = document.querySelector("#sentTitle").value;
        sentDescription = document.querySelector("#textDescription").value;
        date = document.getElementById("date").value;
        time = document.getElementById("time").value;

        // use the date() obj to create a date Obj from a string value same for time
        dateValue = new Date(date);
        timeValue = new Date(`1994-12-03T${time}`);

        // date and time objs converted to ISO standards
        isoDate = dateValue.toDateString();
        isoTime = timeValue.toLocaleTimeString();
        const allData = {
          sentTitle: sentTitle,
          sentDescription: sentDescription,
          isoDate: isoDate,
          isoTime: isoTime,
        };

        // Save it to localStorage (Key: "sharedData", Value: value), where JSON is used to store allData
        localStorage.setItem("sharedData", JSON.stringify(allData));
        window.location.href = "./main.html";
      }
    </script>
  </body>
</html>
